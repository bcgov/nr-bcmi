@if (activities && activities.length > 0) {
  <ul class="sa-list">
    @for (act of activities; track act) {
      <li class="{{act?.cssClass}}">
        <span class="sa-name">{{act?.name}}</span>
        <span class="sa-status">{{act?.status}}@if (!act?.status) {
          <span>---</span>
        }</span>
      </li>
    }
  </ul>
}
