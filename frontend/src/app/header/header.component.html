<header class="app-header" id="header">
  <div class="brand-container">
    <a class="brand" href="/" [routerLink]="['/']" tabindex="0"> </a>
    <button class="navbar-toggler float-right hidden-xl-up collapsed" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNav"
      aria-controls="mainNav"
      aria-expanded="false"
      aria-label="Toggle navigation"><i class="material-icons">menu</i><span>MENU</span>
    </button>
  </div>

  <nav class="navbar navbar-expand-xl main-nav">
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav">
        @for (nav of navigation; track nav) {
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              tabindex="0"
              (keydown)="preventDefault($event)"
              (click)="preventDefault($event)">
              <span>{{nav.Short_heading}}</span>
            </a>
            <div class="dropdown-menu dm-sm dropdown-menu-right">
              @for (link of nav.pages; track link) {
                <a class="dropdown-item" [routerLink]="link.route">
                  <strong>{{link.Title}}</strong>
                  <span class="dd-item-desc">{{link.tooltip}}</span>
                </a>
              }
            </div>
          </li>
        }
        <li class="nav-item">
          <a class="nav-link" href="/contact" [routerLink]="['/contact']"><span>Connect With Us</span></a>
        </li>
      </ul>
    </div>
  </nav>
</header>
